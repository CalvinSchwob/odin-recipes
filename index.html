<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Recipes</title>
    <link rel="stylesheet" href="styles/mainpage.css">
</head>
<body>
    <h1>Odin Recipes</h1>
    <div class="recipeCardContainer">
        <div>
            <img src="img/pasta.png" alt="Image of delicious pasta" class="recipeImage">
            <h2 class="recipeTitle">Pasta</h2>
            <p class="recipeStats">20 Min - Easy</p>
            <p class="recipeDiscription">Cook delicious Pasta</p>
        </div>
        <div>
            <img src="img/pizza.png" alt="Image of delicious Pizza" class="recipeImage">
            <h2 class="recipeTitle">Pizza</h2>
            <p class="recipeStats">45 Min - Easy</p>
            <p class="recipeDiscription">Make your own Pizza</p>
        </div>
        <div>
            <img src="img/poridge.jpg" alt="Image of delicious Porridge" class="recipeImage">
            <h2 class="recipeTitle">Porridge</h2>
            <p class="recipeStats">15 Min - Easy</p>
            <p class="recipeDiscription">Enjoy some selfmade Porridge</p>
        </div>
    </div>
</body>
</html>
